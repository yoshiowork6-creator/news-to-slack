name: News to Slack

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 依存パッケージをインストール
        run: pip install feedparser requests
      - name: ニュースを取得してSlackに投稿
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_BIZECO: ${{ secrets.SLACK_WEBHOOK_URL_BIZECO }}
        run: python news_to_slack.py
